<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لوحة العقرب | نظام الإدارة المتكامل</title>
    
    <!-- الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- مكتبات مساعدة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* ---------- متغيرات أساسية (دعم الوضع الليلي/النهاري) ---------- */
        :root {
            color-scheme: light dark;
            --bg-gradient-start: #f4f7fc;
            --bg-gradient-end: #e9eef4;
            --surface-bg: rgba(255, 255, 255, 0.75);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-primary: #0b1e33;
            --text-secondary: #3a4b5e;
            --border-light: rgba(0, 0, 0, 0.08);
            --primary-color: #2a6df4;
            --primary-soft: rgba(42, 109, 244, 0.1);
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.04);
            --backdrop: blur(18px);
            --input-bg: rgba(255, 255, 255, 0.7);
            --icon-invert: 0;
            --transition: all 0.2s ease;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient-start: #0b1120;
                --bg-gradient-end: #111a28;
                --surface-bg: rgba(18, 28, 40, 0.7);
                --card-bg: rgba(22, 34, 48, 0.8);
                --text-primary: #eef2fb;
                --text-secondary: #a1b5cc;
                --border-light: rgba(255, 255, 255, 0.08);
                --input-bg: rgba(10, 20, 30, 0.6);
                --icon-invert: 1;
            }
        }

        /* الوضع اليدوي */
        body.light-mode {
            --bg-gradient-start: #f4f7fc;
            --bg-gradient-end: #e9eef4;
            --surface-bg: rgba(255, 255, 255, 0.75);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-primary: #0b1e33;
            --text-secondary: #3a4b5e;
            --border-light: rgba(0, 0, 0, 0.08);
            --input-bg: rgba(255, 255, 255, 0.7);
            --icon-invert: 0;
        }
        body.dark-mode {
            --bg-gradient-start: #0b1120;
            --bg-gradient-end: #111a28;
            --surface-bg: rgba(18, 28, 40, 0.7);
            --card-bg: rgba(22, 34, 48, 0.8);
            --text-primary: #eef2fb;
            --text-secondary: #a1b5cc;
            --border-light: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(10, 20, 30, 0.6);
            --icon-invert: 1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Amiri', serif; -webkit-tap-highlight-color: transparent; }
        body, html { 
            width: 100%; height: 100%; 
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            display: flex; justify-content: center; align-items: center; 
            color: var(--text-primary);
            transition: background 0.3s;
        }

        .app-container {
            width: 100%; max-width: 480px; height: 100%; max-height: 900px;
            background: var(--surface-bg);
            backdrop-filter: var(--backdrop);
            -webkit-backdrop-filter: var(--backdrop);
            position: relative; overflow: hidden;
            border-radius: 32px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
        }
        @media (min-width: 481px) { .app-container { height: 94vh; margin: 2vh auto; } }

        /* شاشات */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; background: transparent; opacity: 0; pointer-events: none; transition: opacity 0.25s; overflow-y: auto; padding-bottom: 80px; }
        .screen.active { opacity: 1; pointer-events: auto; z-index: 5; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 10px; }
        .header h2 { font-size: 1.5rem; font-weight: 700; }
        .icon-btn { width: 44px; height: 44px; border-radius: 14px; background: var(--input-bg); border: 1px solid var(--border-light); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-primary); backdrop-filter: blur(4px); }
        
        .content { padding: 12px 18px; flex: 1; }
        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border-light); border-radius: 28px; padding: 22px 18px; margin-bottom: 20px; box-shadow: var(--shadow-sm); }

        /* --- إدخال الهاتف + العلم (مخصص) --- */
        .phone-wrapper { display: flex; gap: 8px; align-items: center; width: 100%; }
        .phone-input { flex: 1; min-width: 0; }
        .country-selector { position: relative; width: 100px; flex-shrink: 0; }
        .country-btn { width: 100%; height: 52px; background: var(--input-bg); border: 1px solid var(--border-light); border-radius: 16px; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 0 8px; cursor: pointer; color: var(--text-primary); font-weight: 600; backdrop-filter: blur(4px); }
        .country-btn span { font-size: 1.6rem; line-height: 1; }
        .country-dropdown { position: absolute; top: 60px; left: 0; width: 200px; background: var(--card-bg); border: 1px solid var(--border-light); border-radius: 18px; backdrop-filter: blur(20px); z-index: 100; max-height: 220px; overflow-y: auto; display: none; box-shadow: 0 12px 25px rgba(0,0,0,0.2); }
        .country-dropdown.active { display: block; }
        .country-option { padding: 10px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid var(--border-light); color: var(--text-primary); }
        .country-option:last-child { border: none; }
        .country-option:hover { background: var(--primary-soft); }
        .country-flag { font-size: 1.8rem; }

        input, select, textarea {
            width: 100%; height: 52px; padding: 0 16px; 
            background: var(--input-bg) !important; 
            border: 1px solid var(--border-light) !important;
            border-radius: 18px !important; 
            color: var(--text-primary) !important;
            font-size: 1rem; outline: none; 
            backdrop-filter: blur(4px);
            transition: var(--transition);
        }
        textarea { height: auto; padding: 14px; min-height: 90px; }
        ::placeholder { color: var(--text-secondary); opacity: 0.6; }
        .input-label { font-size: 0.9rem; margin-bottom: 6px; color: var(--text-secondary); font-weight: 600; }

        /* أزرار */
        .btn-primary { background: var(--primary-color); color: white; border: none; border-radius: 18px; padding: 14px 20px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 14px rgba(42,109,244,0.25); }
        .btn-outline { background: transparent; border: 1px solid var(--border-light); color: var(--text-primary); }

        /* إحصائيات */
        .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin: 20px 0; }
        .stat-card { background: var(--primary-soft); border-radius: 20px; padding: 16px 8px; text-align: center; border: 1px solid var(--border-light); }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--primary-color); }

        /* المحافظ */
        .wallet-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
        .wallet-row select { width: 140px; }

        /* شريط سفلي */
        .bottom-nav { position: absolute; bottom: 12px; left: 12px; right: 12px; background: var(--card-bg); backdrop-filter: blur(20px); padding: 8px 6px; display: flex; justify-content: space-around; border-radius: 40px; border: 1px solid var(--border-light); z-index: 50; }
        .nav-item { color: var(--text-secondary); display: flex; flex-direction: column; align-items: center; font-size: 1.2rem; cursor: pointer; padding: 6px 0; border-radius: 30px; transition: 0.2s; flex:1; }
        .nav-item.active { color: var(--primary-color); background: var(--primary-soft); }
        .nav-save { width: 52px; height: 52px; background: var(--primary-color); border-radius: 30px; display: flex; align-items: center; justify-content: center; color: white; margin-top: -22px; box-shadow: 0 10px 20px rgba(42,109,244,0.4); cursor: pointer; }

        /* توست */
        .toast { position: absolute; bottom: 100px; left: 20px; right: 20px; background: #1e293b; color: white; padding: 14px; border-radius: 24px; text-align: center; z-index: 200; opacity: 0; transition: 0.2s; backdrop-filter: blur(12px); }
        .toast.show { opacity: 1; bottom: 120px; }
        
        /* تحسينات responsive */
        .flex-row { display: flex; gap: 10px; align-items: center; }
        .mt-4 { margin-top: 16px; }
        .theme-toggle { margin-left: 8px; }
    </style>
</head>
<body>
<div class="app-container">

    <!-- Toast -->
    <div id="toastMsg" class="toast"><span id="toastText">تم</span></div>

    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen" class="screen active">
        <div class="header"><h2>تسجيل الدخول</h2></div>
        <div class="content" style="justify-content:center; display:flex; flex-direction:column;">
            <i class="fa-solid fa-user-lock" style="font-size:60px; margin:30px 0; color:var(--primary-color);"></i>
            <button class="btn-primary" onclick="loginWithGoogle()" style="margin-bottom:16px;"><i class="fa-brands fa-google"></i> دخول باستخدام Google</button>
            <div style="text-align:center; margin:16px 0;">أو</div>
            <div class="input-label">رقم المساعد</div>
            <input type="tel" id="assistantLoginPhone" placeholder="01xxxxxxxxx" dir="ltr">
            <div class="input-label mt-4">كلمة المرور</div>
            <input type="password" id="assistantLoginPass" placeholder="كود الدخول">
            <button class="btn-primary mt-4" onclick="loginAssistant()">دخول</button>
        </div>
    </div>

    <!-- الشاشة الرئيسية -->
    <div id="homeScreen" class="screen">
        <div class="header">
            <h2>لوحة التحكم</h2>
            <div style="display:flex; gap:8px;">
                <button class="icon-btn" onclick="toggleTheme()"><i class="fa-solid fa-circle-half-stroke"></i></button>
                <button class="icon-btn" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
            </div>
        </div>
        <div class="content">
            <div class="card" style="text-align:center;">
                <div id="coverPreviewBox" style="width:100%; height:140px; border-radius:20px; background:var(--input-bg); margin-bottom:16px; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="document.getElementById('coverUpload').click()">
                    <i class="fa-solid fa-camera" style="font-size:32px; opacity:0.5;"></i>
                    <img id="coverImg" style="width:100%; height:100%; object-fit:cover; border-radius:20px; display:none;">
                </div>
                <input type="file" id="coverUpload" hidden accept="image/*" onchange="showCoverPreview(this)">
                <h2 id="dashboardName">الاسم</h2>
                <p id="dashboardTitle">المسمى</p>
            </div>

            <!-- إحصائيات -->
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-value" id="statBookings">0</span><p>حجز اليوم</p></div>
                <div class="stat-card"><span class="stat-value" id="statCustomers">0</span><p>عملاء</p></div>
                <div class="stat-card"><span class="stat-value" id="statRevenue">0</span><p>جنيه</p></div>
            </div>

            <div class="card">
                <h3 style="margin-bottom:16px;">رابطك العام</h3>
                <div style="background:var(--input-bg); padding:14px; border-radius:16px; direction:ltr; text-align:center; margin-bottom:16px;" id="publicLinkBox">...</div>
                <button class="btn-primary" onclick="copyPublicLink()"><i class="fa-regular fa-copy"></i> نسخ الرابط</button>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="card" style="padding:16px;" onclick="switchTab('bookingsScreen')">
                    <i class="fa-solid fa-calendar-check" style="font-size:24px; color:var(--primary-color);"></i>
                    <h4>الحجوزات</h4>
                </div>
                <div class="card" style="padding:16px;" onclick="switchTab('profileScreen')">
                    <i class="fa-solid fa-gear"></i>
                    <h4>الإعدادات</h4>
                </div>
            </div>
        </div>
    </div>

    <!-- الإعدادات -->
    <div id="profileScreen" class="screen">
        <div class="header"><h2>الملف الشخصي</h2><button class="icon-btn" onclick="toggleTheme()"><i class="fa-solid fa-circle-half-stroke"></i></button></div>
        <div class="content">
            <div class="card">
                <div class="input-label">الاسم</div><input id="adminName" placeholder="الاسم">
                <div class="input-label mt-4">المسمى</div><input id="adminTitle">
                <div class="input-label mt-4">نبذة</div><textarea id="adminAbout"></textarea>
            </div>
            <div class="card">
                <div class="input-label">رقم الهاتف الأساسي</div>
                <div id="phone1Container" class="phone-wrapper"></div>
                <div class="input-label mt-4">رقم إضافي</div>
                <div id="phone2Container" class="phone-wrapper"></div>
            </div>
            <div class="card">
                <div class="input-label"><i class="fa-brands fa-instagram"></i> Instagram</div>
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <label style="display:flex; align-items:center;"><input type="radio" name="instaType" value="link" checked onchange="toggleInstaInput()"> رابط</label>
                    <label style="display:flex; align-items:center;"><input type="radio" name="instaType" value="phone" onchange="toggleInstaInput()"> رقم هاتف</label>
                </div>
                <div id="instaLinkDiv"><input id="instaLink" placeholder="https://instagram.com/..." dir="ltr"></div>
                <div id="instaPhoneDiv" style="display:none;"><div id="instaPhoneContainer" class="phone-wrapper"></div></div>
            </div>
            <div class="card">
                <div class="input-label">المحافظ الإلكترونية (مصر)</div>
                <select id="walletProvider" style="margin-bottom:8px;">
                    <option value="">اختر المحفظة</option>
                    <option value="vodafone">Vodafone Cash</option><option value="etisalat">Etisalat Cash</option><option value="orange">Orange Cash</option><option value="we">WE Pay</option>
                </select>
                <div id="walletPhoneContainer" class="phone-wrapper"></div>
            </div>
            <div class="card">
                <div class="input-label">مساعدين (رقم هاتف)</div>
                <div id="assistantPhoneContainer" class="phone-wrapper"></div>
                <button class="btn-primary mt-4" onclick="addAssistant()">إضافة مساعد</button>
                <div id="assistantsList" style="margin-top:16px;"></div>
            </div>
            <div class="card">
                <div class="input-label">كود المساعدين</div>
                <label><input type="checkbox" id="enableCode"> تفعيل كود الدخول</label>
                <input id="manualCode" placeholder="الكود" class="mt-4">
                <div class="flex-row mt-4"><input type="number" id="codeDays" placeholder="أيام"><input type="number" id="codeHours" placeholder="ساعات"></div>
            </div>
        </div>
    </div>

    <!-- الحجوزات -->
    <div id="bookingsScreen" class="screen">
        <div class="header"><h2>الحجوزات</h2><div><label class="switch"><input type="checkbox" id="bookingToggle" onchange="toggleBookingState()"><span class="slider"></span></label></div></div>
        <div class="content">
            <div class="flex-row"><input id="searchBooking" placeholder="بحث برقم الهاتف" oninput="filterBookingsUI()"></div>
            <div id="bookingsList"></div>
        </div>
    </div>

    <!-- شريط التنقل -->
    <div class="bottom-nav" id="mainNav" style="display:none;">
        <div class="nav-item active" onclick="switchTab('homeScreen')"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item" onclick="switchTab('profileScreen')"><i class="fa-solid fa-user"></i></div>
        <div class="nav-save" onclick="saveAllData()"><i class="fa-solid fa-check"></i></div>
        <div class="nav-item" onclick="switchTab('bookingsScreen')"><i class="fa-solid fa-calendar"></i></div>
        <div class="nav-item" onclick="switchTab('linksScreen')"><i class="fa-solid fa-link"></i></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAxxWhIBlC92x_T4lBjDj7p7B3hrvhVZYg",
      authDomain: "alaqrab-system.firebaseapp.com",
      projectId: "alaqrab-system",
      storageBucket: "alaqrab-system.firebasestorage.app",
      messagingSenderId: "660494503813",
      appId: "1:660494503813:web:3f45fc069b3506f8657eec"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    let currentUser = null, userDocId = null, isAssistant = false;
    let allBookings = [];

    // ---------- بيانات الدول (مصر افتراضيًا) ----------
    const countries = [
        { code: '+20', name: 'مصر', flag: '🇪🇬' },
        { code: '+966', name: 'السعودية', flag: '🇸🇦' },
        { code: '+971', name: 'الإمارات', flag: '🇦🇪' },
        { code: '+965', name: 'الكويت', flag: '🇰🇼' }
    ];
    
    function createPhoneInput(containerId, defaultCountryCode = '+20', onChange) {
        const container = document.getElementById(containerId);
        if(!container) return;
        container.innerHTML = `
            <input type="tel" class="phone-input" placeholder="رقم الهاتف" dir="ltr" id="${containerId}_input">
            <div class="country-selector">
                <div class="country-btn" id="${containerId}_btn"><span id="${containerId}_flag">🇪🇬</span> <span id="${containerId}_code">+20</span></div>
                <div class="country-dropdown" id="${containerId}_dropdown"></div>
            </div>
        `;
        const dropdown = document.getElementById(`${containerId}_dropdown`);
        countries.forEach(c => {
            const opt = document.createElement('div'); opt.className = 'country-option';
            opt.innerHTML = `<span class="country-flag">${c.flag}</span><span>${c.name} (${c.code})</span>`;
            opt.onclick = () => {
                document.getElementById(`${containerId}_flag`).innerText = c.flag;
                document.getElementById(`${containerId}_code`).innerText = c.code;
                dropdown.classList.remove('active');
                if(onChange) onChange(c.code);
            };
            dropdown.appendChild(opt);
        });
        document.getElementById(`${containerId}_btn`).onclick = (e) => { e.stopPropagation(); dropdown.classList.toggle('active'); };
        document.addEventListener('click', () => dropdown.classList.remove('active'));
        return {
            getValue: () => document.getElementById(`${containerId}_code`).innerText + '|' + document.getElementById(`${containerId}_input`).value,
            setValue: (full) => { if(full) { const [code, num] = full.split('|'); if(code) document.getElementById(`${containerId}_code`).innerText = code; if(num) document.getElementById(`${containerId}_input`).value = num; } }
        };
    }

    // تهيئة حقول الهاتف
    let phone1Ctrl, phone2Ctrl, instaPhoneCtrl, walletPhoneCtrl, assistantPhoneCtrl;
    function initPhoneFields() {
        phone1Ctrl = createPhoneInput('phone1Container');
        phone2Ctrl = createPhoneInput('phone2Container');
        instaPhoneCtrl = createPhoneInput('instaPhoneContainer');
        walletPhoneCtrl = createPhoneInput('walletPhoneContainer');
        assistantPhoneCtrl = createPhoneInput('assistantPhoneContainer');
    }
    initPhoneFields();

    window.toggleInstaInput = () => {
        const isPhone = document.querySelector('input[name="instaType"]:checked').value === 'phone';
        document.getElementById('instaLinkDiv').style.display = isPhone ? 'none' : 'block';
        document.getElementById('instaPhoneDiv').style.display = isPhone ? 'block' : 'none';
    };

    // مساعدين مؤقتين
    let tempAssistants = [];
    window.addAssistant = () => {
        const val = assistantPhoneCtrl.getValue();
        if(val.split('|')[1]) { tempAssistants.push(val); renderAssistants(); assistantPhoneCtrl.setValue(''); }
    };
    function renderAssistants() {
        const list = document.getElementById('assistantsList');
        list.innerHTML = tempAssistants.map((a,i) => `<div class="flex-row"><span>${a}</span><i class="fa-solid fa-trash" onclick="removeAssistant(${i})"></i></div>`).join('');
    }
    window.removeAssistant = (i) => { tempAssistants.splice(i,1); renderAssistants(); };

    // ---------- UI والثيم ----------
    window.toggleTheme = () => {
        document.body.classList.toggle('dark-mode');
        document.body.classList.toggle('light-mode');
    };
    window.showToast = (msg) => { const t = document.getElementById('toastMsg'); document.getElementById('toastText').innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); };
    window.switchTab = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(id==='homeScreen') document.querySelectorAll('.nav-item')[0].classList.add('active');
        else if(id==='profileScreen') document.querySelectorAll('.nav-item')[1].classList.add('active');
        else if(id==='bookingsScreen') document.querySelectorAll('.nav-item')[3].classList.add('active');
    };
    window.copyPublicLink = () => { navigator.clipboard.writeText(`https://alaqrab.app/user/${userDocId}`); showToast('تم النسخ'); };

    // معاينة الصورة
    window.showCoverPreview = (inp) => {
        if(inp.files[0]) { const r = new FileReader(); r.onload = e => { document.getElementById('coverImg').src=e.target.result; document.getElementById('coverImg').style.display='block'; }; r.readAsDataURL(inp.files[0]); }
    };

    // ---------- Firebase ----------
    window.loginWithGoogle = () => signInWithPopup(auth, new GoogleAuthProvider());
    window.loginAssistant = () => showToast('خاصية قيد التطوير');
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            currentUser = user;
            const mapDoc = await getDoc(doc(db, "auth_mapping", user.uid));
            if(mapDoc.exists()) {
                userDocId = mapDoc.data().userDocId; isAssistant = mapDoc.data().isAssistant || false;
                document.getElementById('mainNav').style.display = 'flex';
                document.getElementById('loginScreen').classList.remove('active');
                document.getElementById('homeScreen').classList.add('active');
                loadUserData();
                listenBookings();
            } else {
                // إنشاء مستند جديد
                userDocId = user.uid.substring(0,8);
                await setDoc(doc(db, "users", userDocId), { displayName: user.displayName || 'مستخدم', isBookingActive: false });
                await setDoc(doc(db, "auth_mapping", user.uid), { userDocId, isAssistant: false });
                loadUserData();
            }
        } else {
            document.getElementById('mainNav').style.display = 'none';
            document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
            document.getElementById('loginScreen').classList.add('active');
        }
    });

    async function loadUserData() {
        const snap = await getDoc(doc(db, "users", userDocId));
        if(!snap.exists()) return;
        const d = snap.data();
        document.getElementById('dashboardName').innerText = d.displayName || '';
        document.getElementById('dashboardTitle').innerText = d.title || '';
        document.getElementById('adminName').value = d.displayName || '';
        document.getElementById('adminTitle').value = d.title || '';
        document.getElementById('adminAbout').value = d.about || '';
        document.getElementById('publicLinkBox').innerText = `https://alaqrab.app/user/${userDocId}`;
        document.getElementById('bookingToggle').checked = d.isBookingActive || false;
        if(d.phone1) phone1Ctrl.setValue(d.phone1);
        if(d.phone2) phone2Ctrl.setValue(d.phone2);
        if(d.instaType === 'phone' && d.instaPhone) { document.querySelector('input[value="phone"]').checked = true; toggleInstaInput(); instaPhoneCtrl.setValue(d.instaPhone); }
        else { document.getElementById('instaLink').value = d.instaLink || ''; }
        if(d.walletProvider) document.getElementById('walletProvider').value = d.walletProvider;
        if(d.walletPhone) walletPhoneCtrl.setValue(d.walletPhone);
        tempAssistants = d.assistants || []; renderAssistants();
        document.getElementById('enableCode').checked = d.enableCode || false;
        if(d.heroImg) { document.getElementById('coverImg').src = d.heroImg; document.getElementById('coverImg').style.display='block'; }
        updateStats();
    }

    function updateStats() {
        const today = new Date().toISOString().split('T')[0];
        const todayBookings = allBookings.filter(b => b.date === today && b.status !== 'canceled').length;
        document.getElementById('statBookings').innerText = todayBookings;
        document.getElementById('statCustomers').innerText = new Set(allBookings.map(b=>b.userPhone)).size;
        document.getElementById('statRevenue').innerText = allBookings.filter(b=>b.status==='done').reduce((s,b)=> s + (b.price||0),0);
    }

    function listenBookings() {
        onSnapshot(query(collection(db, "users", userDocId, "bookings"), orderBy("createdAt","desc")), snap => {
            allBookings = []; snap.forEach(d => { allBookings.push({id:d.id, ...d.data()}); });
            filterBookingsUI(); updateStats();
        });
    }
    window.filterBookingsUI = () => {
        const q = document.getElementById('searchBooking').value;
        const filtered = allBookings.filter(b => !q || b.userPhone?.includes(q));
        const list = document.getElementById('bookingsList');
        list.innerHTML = filtered.map(b => `<div class="card"><b>${b.userName}</b> - ${b.userPhone}<br>${b.date} ${b.time}<br>${b.status||'جديد'}</div>`).join('');
    };
    window.toggleBookingState = async () => {
        const val = document.getElementById('bookingToggle').checked;
        await updateDoc(doc(db, "users", userDocId), { isBookingActive: val });
        showToast(val?'تم تفعيل الحجوزات':'تم إيقاف الحجوزات');
    };

    window.saveAllData = async () => {
        const data = {
            displayName: document.getElementById('adminName').value,
            title: document.getElementById('adminTitle').value,
            about: document.getElementById('adminAbout').value,
            phone1: phone1Ctrl.getValue(),
            phone2: phone2Ctrl.getValue(),
            instaType: document.querySelector('input[name="instaType"]:checked').value,
            instaLink: document.getElementById('instaLink').value,
            instaPhone: instaPhoneCtrl.getValue(),
            walletProvider: document.getElementById('walletProvider').value,
            walletPhone: walletPhoneCtrl.getValue(),
            assistants: tempAssistants,
            enableCode: document.getElementById('enableCode').checked,
            manualCode: document.getElementById('manualCode').value,
            heroImg: document.getElementById('coverImg').src
        };
        await updateDoc(doc(db, "users", userDocId), data);
        showToast('تم الحفظ');
    };
</script>
</body>
</html>
